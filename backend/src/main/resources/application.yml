server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hubble_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

jwt:
  secret: hubble-super-secret-key-change-this-in-production
  access-token-expiration: 3600000
  refresh-token-expiration: 2592000000

aws:
  s3:
    bucket-name: hubble-media
    region: ap-southeast-1
    access-key: YOUR_AWS_ACCESS_KEY
    secret-key: YOUR_AWS_SECRET_KEY

logging:
  level:
    com.hubble: DEBUG
