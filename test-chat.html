<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hubble - Test Realtime</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #36393f; color: white; }
        .chat-box { background: #2f3136; padding: 20px; border-radius: 8px; width: 500px; }
        input { padding: 10px; width: 300px; border-radius: 4px; border: none; }
        button { padding: 10px 15px; background: #5865F2; color: white; border: none; border-radius: 4px; cursor: pointer; }
        ul { list-style-type: none; padding: 0; }
        li { background: #40444b; margin: 10px 0; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="chat-box">
        <h2>📡 Hubble Live Receiver</h2>
        <input type="text" id="channelId" value="123e4567-e89b-12d3-a456-426614174000">
        <button onclick="connect()">Cắm ống tủy (Connect)</button>
        <p id="status" style="color: #faa61a;">Trạng thái: Chưa kết nối</p>
        
        <h3>Tin nhắn Real-time:</h3>
        <ul id="messages"></ul>
    </div>

    <script>
        var stompClient = null;

        function connect() {
                    var channelId = document.getElementById('channelId').value;
                    
                    // XÓA sạch dòng var socket = new SockJS(...)
                    // Kết nối thẳng bằng WebSocket thuần (dùng ws:// thay vì http://)
                    stompClient = Stomp.client('ws://localhost:8080/ws');
                    
                    stompClient.debug = null; 

                    stompClient.connect({}, function (frame) {
                        document.getElementById('status').innerText = 'Trạng thái: Đã kết nối tới phòng!';
                        document.getElementById('status').style.color = '#43b581';

                        stompClient.subscribe('/topic/channel/' + channelId, function (message) {
                            var data = JSON.parse(message.body);
                            var li = document.createElement('li');
                            li.innerHTML = `<strong>👤 ${data.senderId}</strong>: ${data.content}`;
                            document.getElementById('messages').prepend(li); 
                        });
                    }, function(error) {
                        document.getElementById('status').innerText = 'Trạng thái: Mất kết nối! Lỗi: ' + error;
                        document.getElementById('status').style.color = '#f04747';
                    });
                }
    </script>
</body>
</html>
